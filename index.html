<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Naqshify Studio — Free AI Art Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F6F1E7;
    --ink: #23211D;
    --wood: #8B5A2B;
    --wood-dark: #5E3B1C;
    --brass: #B8863B;
    --sage: #7C8B73;
    --line: #DDD3BE;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--paper);
    background-image:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.012) 0px, rgba(0,0,0,0.012) 1px, transparent 1px, transparent 3px);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }

  .wrap{
    max-width:760px;
    margin:0 auto;
    padding:48px 20px 60px;
  }

  header{
    text-align:center;
    margin-bottom:46px;
  }

  .eyebrow{
    font-size:0.75rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--sage);
    font-weight:600;
    margin-bottom:14px;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:2.6rem;
    margin:0;
    line-height:1.15;
    color:var(--ink);
  }

  h1 .script{
    font-family:'Caveat', cursive;
    font-weight:700;
    color:var(--wood-dark);
    font-size:1.15em;
    position:relative;
    display:inline-block;
  }

  .underline-stroke{
    display:block;
    width:100%;
    height:10px;
    margin-top:-6px;
  }

  .underline-stroke path{
    fill:none;
    stroke:var(--brass);
    stroke-width:3;
    stroke-linecap:round;
    stroke-dasharray:240;
    stroke-dashoffset:240;
    animation:draw-underline 1.1s ease-out 0.3s forwards;
  }

  @keyframes draw-underline{
    to{ stroke-dashoffset:0; }
  }

  .subtitle{
    font-size:1rem;
    color:#5C5750;
    margin:18px auto 0;
    max-width:420px;
    line-height:1.6;
  }

  .tools{
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  .tool-card{
    display:block;
    text-decoration:none;
    color:inherit;
    border-radius:4px;
    overflow:hidden;
    position:relative;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow:0 6px 18px rgba(35,33,29,0.10);
  }
