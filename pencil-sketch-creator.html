<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencil Sketch Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F7F5F0;
    --paper-2: #EFEBE2;
    --graphite: #2B2B2B;
    --pencil: #6B6B6B;
    --pencil-light: #9C9C94;
    --eraser: #D9A5A0;
    --eraser-dark: #C2837D;
    --blueline: #A9C4D4;
    --line: #D8D2C3;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(169,196,212,0.10), transparent 40%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.012) 0px, rgba(0,0,0,0.012) 1px, transparent 1px, transparent 3px);
    color:var(--graphite);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }

  .sketch-font{ font-family:'Architects Daughter', cursive; }

  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:28px 18px 60px;
  }

  header{
    text-align:center;
    margin-bottom:28px;
    position:relative;
  }

  header .pencil-icon{
    font-size:34px;
    display:block;
    margin-bottom:6px;
    transform:rotate(-8deg);
  }

  h1{
    font-family:'Architects Daughter', cursive;
    font-size:2.1rem;
    margin:0 0 4px;
    color:var(--graphite);
    line-height:1.3;
  }

  .subtitle{
    color:var(--pencil);
    font-size:0.95rem;
    margin:0;
  }

  .card{
    background:#fff;
    border:1.5px solid var(--graphite);
    border-radius:3px;
    padding:20px;
    margin-bottom:22px;
    box-shadow: 4px 4px 0 rgba(43,43,43,0.08);
    position:relative;
  }

  .card::before{
    content:'';
    position:absolute;
    top:-1px; left:-1px; right:-1px; bottom:-1px;
    border:1px dashed transparent;
    pointer-events:none;
  }

  label{
    display:block;
    font-size:0.85rem;
    color:var(--pencil);
    margin-bottom:6px;
    font-weight:600;
  }

  textarea{
    width:100%;
    min-height:90px;
    padding:12px;
    border:1.5px solid var(--line);
    border-radius:2px;
    background:var(--paper);
    font-family:'Inter', sans-serif;
    font-size:1rem;
    color:var(--graphite);
    resize:vertical;
    line-height:1.7;
  }

  textarea:focus, select:focus{
    outline:none;
    border-color:var(--blueline);
    box-shadow:0 0 0 3px rgba(169,196,212,0.3);
  }

  .row{
    display:flex;
    gap:12px;
    margin-top:16px;
    flex-wrap:wrap;
  }

  .field{
    flex:1;
    min-width:140px;
  }

  select{
    width:100%;
    padding:10px;
    border:1.5px solid var(--line);
    border-radius:2px;
    background:#fff;
    font-size:0.92rem;
    color:var(--graphite);
    font-family:inherit;
  }

  .style-chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:8px;
  }

  .chip{
    padding:7px 14px;
    border:1.5px solid var(--line);
    border-radius:20px;
    background:#fff;
    font-size:0.82rem;
    color:var(--pencil);
    cursor:pointer;
    transition:all 0.15s ease;
    user-select:none;
  }

  .chip:hover{ border-color:var(--pencil-light); }

  .chip.active{
    background:var(--graphite);
    color:var(--paper);
    border-color:var(--graphite);
  }
