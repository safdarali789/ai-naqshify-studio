<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Text Design Maker - متن ڈیزائن میکر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        body.urdu {
            direction: rtl;
        }

        body.english {
            direction: ltr;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 0.95em;
        }

        .language-toggle {
            display: flex;
            gap: 10px;
            background: #f0f3ff;
            padding: 8px;
            border-radius: 10px;
            border: 2px solid #667eea;
        }

        .lang-btn {
            padding: 10px 20px;
            border: 2px solid transparent;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
            color: #667eea;
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 0;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }

        body.urdu .control-group {
            border-left: none;
            border-right: 4px solid #667eea;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="color"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="color"] {
            height: 50px;
            cursor: pointer;
        }

        .color-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(102, 126, 234, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(102, 126, 234, 0.4);
        }

        .slider-value {
            font-size: 0.85em;
            color: #666;
            text-align: center;
        }

        .preset-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .preset-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }

        .preset-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateY(-2px);
        }

        .preset-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .canvas-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-box {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            position: relative;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .buttons-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: span 2;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f3ff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .btn:active {
            transform: translateY(0);
        }

        .social-sizes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .social-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8em;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .social-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .template-card {
            padding: 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85em;
            transition: all 0.3s ease;
            text-align: center;
        }

        .template-card:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .template-card.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .shape-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .shape-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8em;
            transition: all 0.3s ease;
        }

        .shape-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .shape-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .info-text {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
        }

        .download-format {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .format-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8em;
            transition: all 0.3s ease;
        }

        .format-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .format-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        @media (max-width: 1200px) {
            .tab-content.active {
                grid-template-columns: 1fr;
            }

            .templates-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .buttons-group {
                grid-template-columns: 1fr;
            }

            .btn-primary {
                grid-column: span 1;
            }

            .templates-grid {
                grid-template-columns: 1fr;
            }

            .shape-selector {
                grid-template-columns: repeat(2, 1fr);
            }

            .language-toggle {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body class="urdu">
    <div class="container">
        <div class="header">
            <h1>✨ 3D Text Design Maker ✨</h1>
            <p id="subtitle">اردو اور انگریزی میں شاندار متن ڈیزائن بنائیں</p>
            
            <!-- Language Toggle -->
            <div class="language-toggle">
                <button class="lang-btn active" onclick="switchLanguage('urdu')">🇵🇰 اردو</button>
                <button class="lang-btn" onclick="switchLanguage('english')">🇺🇸 English</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('editor')" id="tab-editor">🎨 ڈیزائن ایڈیٹر</button>
            <button class="tab-btn" onclick="switchTab('social')" id="tab-social">📱 سوشل میڈیا</button>
            <button class="tab-btn" onclick="switchTab('templates')" id="tab-templates">🎭 ٹیمپلیٹس</button>
        </div>

        <!-- TAB 1: Editor -->
        <div id="editor" class="tab-content active">
            <div class="control-panel">
                <!-- Text Input -->
                <div class="control-group">
                    <label id="label-text">📝 آپ کا متن</label>
                    <input type="text" id="textInput" value="السلام علیکم" maxlength="60" placeholder="متن درج کریں...">
                    <p class="info-text" id="info-limit">حد: 60 حروف</p>
                </div>

                <!-- Font Size -->
                <div class="control-group">
                    <label id="label-fontSize">حروف کا سائز</label>
                    <div class="slider-group">
                        <input type="range" id="fontSize" min="40" max="200" value="100">
                        <span class="slider-value" id="fontSizeValue">100px</span>
                    </div>
                </div>

                <!-- Text Effect Style -->
                <div class="control-group">
                    <label id="label-effect">3D اثر کا انداز</label>
                    <div class="shape-selector">
                        <button class="shape-btn active" data-style="chrome" onclick="setEditorStyle(event)">Chrome</button>
                        <button class="shape-btn" data-style="gold" onclick="setEditorStyle(event)">Gold</button>
                        <button class="shape-btn" data-style="neon" onclick="setEditorStyle(event)">Neon</button>
                        <button class="shape-btn" data-style="ice" onclick="setEditorStyle(event)">Ice</button>
                        <button class="shape-btn" data-style="fire" onclick="setEditorStyle(event)">Fire</button>
                        <button class="shape-btn" data-style="candy" onclick="setEditorStyle(event)">Candy</button>
                    </div>
                </div>

                <!-- Color Presets -->
                <div class="control-group">
                    <label id="label-color-preset">رنگوں کی ترتیب</label>
                    <div class="preset-buttons">
                        <button class="preset-btn active" data-preset="vibrant" onclick="setEditorPreset(event)">Vibrant</button>
                        <button class="preset-btn" data-preset="sunset" onclick="setEditorPreset(event)">Sunset</button>
                        <button class="preset-btn" data-preset="ocean" onclick="setEditorPreset(event)">Ocean</button>
                        <button class="preset-btn" data-preset="forest" onclick="setEditorPreset(event)">Forest</button>
                        <button class="preset-btn" data-preset="pastel" onclick="setEditorPreset(event)">Pastel</button>
                        <button class="preset-btn" data-preset="dark" onclick="setEditorPreset(event)">Dark</button>
                    </div>
                </div>

                <!-- Custom Colors -->
                <div class="control-group">
                    <label id="label-custom-color">اپنے رنگ بنائیں</label>
                    <div class="color-group">
                        <div>
                            <label style="font-size: 0.9em; display: block; margin-bottom: 5px;" id="label-color1">اول رنگ</label>
                            <input type="color" id="color1" value="#ff1744" onchange="render()">
                        </div>
                        <div>
                            <label style="font-size: 0.9em; display: block; margin-bottom: 5px;" id="label-color2">دوم رنگ</label>
                            <input type="color" id="color2" value="#ff5722" onchange="render()">
                        </div>
                    </div>
                </div>

                <!-- Shadow Depth -->
                <div class="control-group">
                    <label id="label-shadow">سایہ کی گہرائی</label>
                    <div class="slider-group">
                        <input type="range" id="shadowDepth" min="0" max="30" value="10">
                        <span class="slider-value" id="shadowDepthValue">10px</span>
                    </div>
                </div>

                <!-- Background Series -->
                <div class="control-group">
                    <label id="label-background">پس منظر کی سیریز</label>
                    <select id="backgroundSeries" onchange="render()">
                        <option value="white">سفید (سادہ)</option>
                        <option value="cloud">بادل کی شکل</option>
                        <option value="gradient">گریڈینٹ</option>
                        <option value="floral">پھولوں والا</option>
                        <option value="elegant">سادہ و شریف</option>
                        <option value="modern">جدید</option>
                        <option value="sparkle">چمکتا ہوا</option>
                        <option value="dark">تاریک</option>
                    </select>
                </div>
            </div>

            <div class="canvas-container">
                <div class="preview-box" id="previewBox">
                    <canvas id="canvas" width="800" height="600"></canvas>
                </div>

                <div class="buttons-group">
                    <button class="btn btn-primary" onclick="downloadImage()" id="btn-download">📥 ڈاؤن لوڈ کریں</button>
                    <button class="btn btn-secondary" onclick="resetSettings()" id="btn-reset">↺ ری سیٹ کریں</button>
                </div>

                <p class="info-text" style="text-align: center;" id="info-quality">💎 الٹرا HD کوالٹی (4000x3000px)</p>
            </div>
        </div>

        <!-- TAB 2: Social Media -->
        <div id="social" class="tab-content">
            <div class="control-panel">
                <div class="control-group">
                    <label id="label-social-text">📝 متن</label>
                    <input type="text" id="socialText" value="مجھے فالو کریں!" maxlength="60" placeholder="متن درج کریں..." onchange="renderSocial()">
                </div>

                <div class="control-group">
                    <label id="label-social-fontSize">حروف کا سائز</label>
                    <div class="slider-group">
                        <input type="range" id="socialFontSize" min="30" max="150" value="80" onchange="updateSocialFontSize(this.value); renderSocial();">
                        <span class="slider-value" id="socialFontSizeValue">80px</span>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-social-effect">3D اثر</label>
                    <div class="shape-selector">
                        <button class="shape-btn active" data-style="chrome" onclick="setSocialStyle(event)">Chrome</button>
                        <button class="shape-btn" data-style="gold" onclick="setSocialStyle(event)">Gold</button>
                        <button class="shape-btn" data-style="neon" onclick="setSocialStyle(event)">Neon</button>
                        <button class="shape-btn" data-style="ice" onclick="setSocialStyle(event)">Ice</button>
                        <button class="shape-btn" data-style="fire" onclick="setSocialStyle(event)">Fire</button>
                        <button class="shape-btn" data-style="candy" onclick="setSocialStyle(event)">Candy</button>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-social-preset">رنگوں کی ترتیب</label>
                    <div class="preset-buttons">
                        <button class="preset-btn active" data-preset="vibrant" onclick="setSocialPreset(event)">Vibrant</button>
                        <button class="preset-btn" data-preset="sunset" onclick="setSocialPreset(event)">Sunset</button>
                        <button class="preset-btn" data-preset="ocean" onclick="setSocialPreset(event)">Ocean</button>
                        <button class="preset-btn" data-preset="forest" onclick="setSocialPreset(event)">Forest</button>
                        <button class="preset-btn" data-preset="pastel" onclick="setSocialPreset(event)">Pastel</button>
                        <button class="preset-btn" data-preset="dark" onclick="setSocialPreset(event)">Dark</button>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-social-color">اپنے رنگ</label>
                    <div class="color-group">
                        <div>
                            <label style="font-size: 0.9em; display: block; margin-bottom: 5px;" id="label-social-color1">رنگ 1</label>
                            <input type="color" id="socialColor1" value="#ff1744" onchange="renderSocial()">
                        </div>
                        <div>
                            <label style="font-size: 0.9em; display: block; margin-bottom: 5px;" id="label-social-color2">رنگ 2</label>
                            <input type="color" id="socialColor2" value="#ff5722" onchange="renderSocial()">
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-social-background">پس منظر</label>
                    <select id="socialBackground" onchange="renderSocial()">
                        <option value="white">سفید</option>
                        <option value="gradient">گریڈینٹ</option>
                        <option value="dark">تاریک</option>
                        <option value="modern">جدید</option>
                    </select>
                </div>
            </div>

            <div class="canvas-container">
                <div class="control-group">
                    <label id="label-social-size">سوشل میڈیا سائز</label>
                    <div class="social-sizes">
                        <button class="social-btn active" onclick="changeSocialSize(1080, 1350)">📷 Instagram</button>
                        <button class="social-btn" onclick="changeSocialSize(1080, 1080)">📷 Square</button>
                        <button class="social-btn" onclick="changeSocialSize(1200, 628)">📘 Facebook</button>
                        <button class="social-btn" onclick="changeSocialSize(1600, 840)">🐦 Twitter</button>
                        <button class="social-btn" onclick="changeSocialSize(1200, 1500)">💼 LinkedIn</button>
                        <button class="social-btn" onclick="changeSocialSize(1080, 1920)">▶️ Reel</button>
                    </div>
                </div>

                <div class="preview-box" id="socialPreviewBox">
                    <canvas id="socialCanvas" width="1080" height="1350"></canvas>
                </div>

                <div class="buttons-group">
                    <button class="btn btn-primary" onclick="downloadSocial()" id="btn-social-download">📥 ڈاؤن لوڈ کریں</button>
                    <button class="btn btn-secondary" onclick="resetSocial()" id="btn-social-reset">↺ ری سیٹ کریں</button>
                </div>

                <p class="info-text" style="text-align: center;" id="info-social">تمام سوشل میڈیا کے لیے تیار!</p>
            </div>
        </div>

        <!-- TAB 3: Templates -->
        <div id="templates" class="tab-content">
            <div class="control-panel">
                <div class="control-group">
                    <label id="label-template-category">🎭 ٹیمپلیٹ منتخب کریں</label>
                    <div class="templates-grid">
                        <button class="template-card active" onclick="loadTemplate('motivational')">💪 حوصلہ</button>
                        <button class="template-card" onclick="loadTemplate('business')">💼 کاروبار</button>
                        <button class="template-card" onclick="loadTemplate('creative')">🎨 تخلیقی</button>
                        <button class="template-card" onclick="loadTemplate('festive')">🎉 جشن</button>
                        <button class="template-card" onclick="loadTemplate('quotes')">💭 حکمت</button>
                        <button class="template-card" onclick="loadTemplate('promo')">🎯 پروموشن</button>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-template-text">📝 متن میں ترمیم کریں</label>
                    <input type="text" id="templateText" value="اپنے آپ پر یقین رکھیں" maxlength="50" placeholder="متن درج کریں..." onchange="renderTemplate()">
                    <p class="info-text" id="templateInfo">متن کو متبدل کریں</p>
                </div>

                <div class="control-group">
                    <label id="label-template-format">فارمیٹ منتخب کریں</label>
                    <div class="download-format">
                        <button class="format-btn active" onclick="setFormat('instagram')">Instagram</button>
                        <button class="format-btn" onclick="setFormat('facebook')">Facebook</button>
                        <button class="format-btn" onclick="setFormat('twitter')">Twitter</button>
                        <button class="format-btn" onclick="setFormat('standard')">Standard</button>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-template-color">رنگین تھیم</label>
                    <div class="preset-buttons">
                        <button class="preset-btn active" data-preset="vibrant" onclick="setTemplatePreset(event)">Vibrant</button>
                        <button class="preset-btn" data-preset="sunset" onclick="setTemplatePreset(event)">Sunset</button>
                        <button class="preset-btn" data-preset="ocean" onclick="setTemplatePreset(event)">Ocean</button>
                        <button class="preset-btn" data-preset="dark" onclick="setTemplatePreset(event)">Dark</button>
                    </div>
                </div>

                <div class="control-group">
                    <label id="label-template-preview">ٹیمپلیٹس کا نمونہ</label>
                    <p class="info-text">✅ 6 اقسام × 4 رنگ = 24 ڈیزائن</p>
                </div>
            </div>

            <div class="canvas-container">

        // ===== DRAWING FUNCTIONS =====
        function drawBackground(ctx, width, height, series) {
            switch(series) {
                case 'white':
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'gradient':
                    const gradient = ctx.createLinearGradient(0, 0, width, height);
                    gradient.addColorStop(0, '#667eea');
                    gradient.addColorStop(1, '#764ba2');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'dark':
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'modern':
                    const gradient2 = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
                    gradient2.addColorStop(0, '#ffffff');
                    gradient2.addColorStop(1, '#e8e8ff');
                    ctx.fillStyle = gradient2;
                    ctx.fillRect(0, 0, width, height);
                    break;
                case 'floral':
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, width, height);
                    ctx.fillStyle = '#ffb3d9';
                    ctx.globalAlpha = 0.2;
                    for(let i = 0; i < 5; i++) {
                        const x = Math.random() * width;
                        const y = Math.random() * height;
                        ctx.beginPath();
                        ctx.arc(x, y, 30, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                    break;
                case 'sparkle':
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, width, height);
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                    for(let i = 0; i < 30; i++) {
                        const x = Math.random() * width;
                        const y = Math.random() * height;
                        ctx.beginPath();
                        ctx.arc(x, y, Math.random() * 3 + 1, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    break;
                case 'cloud':
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, width, height);
                    ctx.fillStyle = '#f0f0f0';
                    ctx.strokeStyle = '#999';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(width * 0.2, height * 0.5);
                    ctx.quadraticCurveTo(width * 0.2, height * 0.2, width * 0.35, height * 0.2);
                    ctx.quadraticCurveTo(width * 0.5, height * 0.2, width * 0.65, height * 0.2);
                    ctx.quadraticCurveTo(width * 0.8, height * 0.2, width * 0.8, height * 0.5);
                    ctx.quadraticCurveTo(width * 0.8, height * 0.8, width * 0.65, height * 0.8);
                    ctx.quadraticCurveTo(width * 0.5, height * 0.8, width * 0.35, height * 0.8);
                    ctx.quadraticCurveTo(width * 0.2, height * 0.8, width * 0.2, height * 0.5);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'elegant':
                    ctx.fillStyle = '#f5f5f5';
                    ctx.fillRect(0, 0, width, height);
                    break;
            }
        }

        function draw3DText(ctx, text, x, y, fontSize, color1, color2, shadowDepth) {
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for(let i = shadowDepth; i > 0; i--) {
                ctx.fillStyle = `rgba(0, 0, 0, ${0.1 * (shadowDepth - i) / shadowDepth})`;
                ctx.fillText(text, x + i * 1.5, y + i * 1.5);
            }

            const gradient = ctx.createLinearGradient(x - fontSize * 2, y - fontSize, x + fontSize * 2, y + fontSize);
            gradient.addColorStop(0, color1);
            gradient.addColorStop(0.5, color2);
            gradient.addColorStop(1, color1);

            ctx.fillStyle = gradient;
            ctx.fillText(text, x, y);

            ctx.strokeStyle = color2;
            ctx.lineWidth = 3;
            ctx.strokeText(text, x, y);

            ctx.shadowColor = color1;
            ctx.shadowBlur = 20;
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = color1;
            ctx.fillText(text, x, y);
            ctx.globalAlpha = 1;
        }

        // ===== RENDER FUNCTIONS =====
        function render() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const text = document.getElementById('textInput').value || 'Design Pro';
            const fontSize = parseInt(document.getElementById('fontSize').value);
            const shadowDepth = parseInt(document.getElementById('shadowDepth').value);
            const color1 = document.getElementById('color1').value;
            const color2 = document.getElementById('color2').value;
            const background = document.getElementById('backgroundSeries').value;

            drawBackground(ctx, width, height, background);
            draw3DText(ctx, text, width/2, height/2, fontSize, color1, color2, shadowDepth);
        }

        function renderSocial() {
            const canvas = document.getElementById('socialCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;

            const text = document.getElementById('socialText').value || 'Follow Me!';

            const background = document.getElementById('socialBackground').value;

            drawBackground(ctx, width, height, background);
            draw3DText(ctx, text, width/2, height/2, fontSize, color1, color2, 15);
        }

        function renderTemplate() {
            const canvas = document.getElementById('templateCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const template = templates[currentTemplate];
            const text = document.getElementById('templateText').value;
            const colors = template.colors[currentPreset] || '#ff1744';
            const color2 = presets[currentPreset]?.color2 || '#ff5722';

            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, colors);
            gradient.addColorStop(1, color2);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            for(let i = 0; i < 10; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 50 + 20, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.font = `bold ${Math.floor(width / 12)}px Arial`;
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            ctx.fillText(text, width/2, height/2);

            ctx.font = `${Math.floor(width / 30)}px Arial`;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            const titleText = currentLanguage === 'urdu' ? template.titleUrdu : template.titleEnglish;
            ctx.fillText(titleText, width/2, height - 40);
        }

        // ===== DOWNLOAD FUNCTIONS =====
        function downloadImage() {
            const hires = document.createElement('canvas');
            hires.width = 4000;
            hires.height = 3000;
            const ctxHires = hires.getContext('2d');
            const scale = 5;

            const text = document.getElementById('textInput').value || 'Design Pro';
            const fontSize = parseInt(document.getElementById('fontSize').value) * scale;
            const shadowDepth = parseInt(document.getElementById('shadowDepth').value) * scale;
            const color1 = document.getElementById('color1').value;
            const color2 = document.getElementById('color2').value;
            const background = document.getElementById('backgroundSeries').value;

            drawBackground(ctxHires, 4000, 3000, background);
            draw3DText(ctxHires, text, 2000, 1500, fontSize, color1, color2, shadowDepth);

            const link = document.createElement('a');
            link.href = hires.toDataURL('image/png');
            link.download = `3D-Text-${Date.now()}.png`;
            link.click();
        }

        function downloadSocial() {
            const canvas = document.getElementById('socialCanvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `Social-Design-${Date.now()}.png`;
            link.click();
        }

        function downloadTemplate() {
            const canvas = document.getElementById('templateCanvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            const template = templates[currentTemplate];
            const title = currentLanguage === 'urdu' ? template.titleUrdu : template.titleEnglish;
            link.download = `Template-${title}-${Date.now()}.png`;
            link.click();
        }

        // ===== RESET FUNCTIONS =====
        function resetSettings() {
            document.getElementById('textInput').value = translations[currentLanguage].textInput;
            document.getElementById('fontSize').value = 100;
            document.getElementById('color1').value = '#ff1744';
            document.getElementById('color2').value = '#ff5722';
            document.getElementById('shadowDepth').value = 10;
            document.getElementById('backgroundSeries').value = 'white';
            document.getElementById('fontSizeValue').textContent = '100px';
            document.getElementById('shadowDepthValue').textContent = '10px';
            render();
        }

        function resetSocial() {
            document.getElementById('socialText').value = translations[currentLanguage].socialText;
            document.getElementById('socialFontSize').value = 80;
            document.getElementById('socialColor1').value = '#ff1744';
            document.getElementById('socialColor2').value = '#ff5722';
            document.getElementById('socialBackground').value = 'white';
            document.getElementById('socialFontSizeValue').textContent = '80px';
            renderSocial();
        }

        function resetTemplate() {
            const template = templates[currentTemplate];
            const texts = currentLanguage === 'urdu' ? template.textsUrdu : template.textsEnglish;
            document.getElementById('templateText').value = texts[0];
            renderTemplate();
        }

        // Initial render
        setTimeout(() => {
            render();
            renderSocial();
            renderTemplate();
        }, 500);
    </script>
</body>
</html>
